<nav class="bottom-nav">
  @for (tab of tabs; track tab.label) {
    <a
      class="bottom-nav__tab"
      [routerLink]="tab.route"
      routerLinkActive="bottom-nav__tab--active"
      [routerLinkActiveOptions]="{ exact: tab.route === '/game' }"
    >
      <span class="bottom-nav__icon">{{ tab.icon }}</span>
      <span class="bottom-nav__label">{{ tab.label | translate }}</span>
    </a>
  }
</nav>
